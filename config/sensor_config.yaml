# ============================================================
# SH-WFS Pipeline — Sensor & System Configuration
# ============================================================
# All physical units are SI (meters, seconds, radians) unless noted.
# Pixel units are always in detector pixels.

# ── Camera ──────────────────────────────────────────────────
camera:
  pixel_size: 5.5e-6          # [m] physical pixel pitch
  bit_depth: 12               # ADU bit depth
  read_noise_e: 3.0           # [e-] RMS read noise
  dark_current_e_per_s: 0.1   # [e-/s]
  gain: 1.0                   # [e-/ADU]
  frame_interval: 2.0e-3      # [s] 500 Hz
  resolution: [128, 128]      # [px] width × height

# ── Microlens Array ─────────────────────────────────────────
mla:
  n_sa_x: 8
  n_sa_y: 8
  # lenslet_size = aperture_diameter / n_sa_x = 6mm / 8 = 0.75mm
  lenslet_size: 7.5e-4        # [m]  FIX: was 3e-4 (inconsistent with aperture)
  focal_length: 6.2e-3        # [m]
  pixels_per_sa: 16           # [px]

# ── Telescope / Beam ─────────────────────────────────────────
telescope:
  aperture_diameter: 6.0e-3   # [m]
  central_obscuration: 0.0
  wavelength: 633.0e-9        # [m]

# ── Pupil Definition ─────────────────────────────────────────
pupil:
  center_x: 63.5              # [px]
  center_y: 63.5              # [px]
  radius_px: 58.0             # [px]

# ── Centroiding ──────────────────────────────────────────────
centroiding:
  algorithm: "threshold_cog"
  threshold_sigma: 3.0
  window_sigma_px: 2.5
  min_flux_threshold: 50.0
  border_px: 2

# ── Reference Centroids ──────────────────────────────────────
reference:
  method: "geometric"
  flat_frame_path: null
  n_frames_average: 20

# ── Deformable Mirror ─────────────────────────────────────────
dm:
  n_actuators_x: 9            # Fried: n_sa_x + 1
  n_actuators_y: 9
  # actuator_pitch must equal lenslet_size (Fried geometry)
  actuator_pitch: 7.5e-4      # [m]  FIX: was 3e-4
  max_stroke: 3.0e-6          # [m] total stroke (±1.5 µm)
  coupling_coefficient: 0.15
  influence_function: "gaussian"
  influence_sigma: 0.4        # fraction of pitch

# ── Wavefront Reconstruction ──────────────────────────────────
reconstruction:
  method: "modal_zernike"
  n_zernike_modes: 21
  svd_threshold: 1e-3
  tikhonov_gamma: 1e-4

# ── Turbulence Simulation ─────────────────────────────────────
turbulence:
  # FIX: r0=2e-5 gave D/r0=300 (pathological). r0=5e-4 → D/r0=12,
  # which is physically meaningful for 21-mode AO correction and
  # keeps d_sa/r0=1.5 (sub-apertures see signal).
  r0: 5.0e-4                  # [m]  D/r0 = 12
  L0: 10.0                    # [m]
  l0: 1.0e-4                  # [m]
  # FIX: wind=0.001 m/s gave τ0=0.314*r0/v=157ms (essentially frozen).
  # v=0.02 m/s → τ0=7.85ms ≈ 4 frames, drift=4mm over 100 frames.
  wind_speed: 0.02            # [m/s]  τ0 = 7.85 ms
  wind_direction_deg: 30.0
  # Increased for better centroid SNR with smaller spot displacements.
  photons_per_sa: 2000

# ── Synthetic Data Output ──────────────────────────────────────
synthetic:
  n_frames: 100
  output_dir: "outputs/frames"
  screen_size_factor: 4
  random_seed: 42